<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biomes du Pit — générateur de décors</title>
<style>
:root{--accent:#5af0e0;--bg:#07080d;--panel:#0f1018;--ink:#d6d0c2;--mut:#6f6a5e;}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#11131c 0%,var(--bg) 60%);color:var(--ink);font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;}
header{padding:22px 20px 6px;text-align:center}
h1{margin:0;font-size:27px;letter-spacing:3px;font-weight:600;color:#e8e0d0;text-shadow:0 0 18px rgba(90,240,224,.3)}
.tag{margin:6px 0 0;color:var(--mut);font-size:13px;font-style:italic}
#biomes{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:14px 16px 6px;max-width:880px;margin:0 auto}
.bt{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.5px;padding:6px 13px;border:1px solid #262234;background:#13131d;color:#b6b0a2;border-radius:3px;cursor:pointer;transition:.15s}
.bt:hover{border-color:var(--accent);color:#e8e0d0}
.bt.active{border-color:var(--accent);background:var(--accent);color:#08100e}
.head2{text-align:center;padding:4px 20px 0}
#bName{font-size:19px;letter-spacing:1px;color:#e8e0d0}
#bSub{color:var(--mut);font-size:13px;font-style:italic;max-width:600px;margin:4px auto 0}
.stage{max-width:780px;margin:14px auto 0;padding:0 16px}
#scene{display:block;width:100%;height:auto;image-rendering:pixelated;border:1px solid #20202c;border-radius:6px;box-shadow:0 0 30px rgba(0,0,0,.55)}
.bar{display:flex;gap:14px;align-items:center;justify-content:center;padding:12px 20px 4px;flex-wrap:wrap}
#reroll{font-family:ui-monospace,monospace;font-size:13px;padding:7px 16px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:4px;cursor:pointer;transition:.15s}
#reroll:hover{background:var(--accent);color:#08100e}

#seed b{color:#b6b0a2;font-weight:600}

.lt{font-family:ui-monospace,monospace;font-size:11px;padding:4px 10px;border:1px solid #262234;background:#13131d;color:#8a8476;border-radius:12px;cursor:pointer;user-select:none;transition:.12s}
.lt.on{border-color:var(--accent);color:#cfe8e2;background:rgba(90,240,224,.08)}
.note{max-width:680px;margin:14px auto 30px;padding:0 20px;color:#5a554a;font-size:11px;text-align:center;font-style:italic}
</style></head><body>
<header><h1>BIOMES DU PIT</h1><p class="tag">décors d'ambiance en couches — à animer au shader</p></header>
<nav id="biomes"></nav>
<div class="head2"><div id="bName"></div><div id="bSub"></div></div>
<div class="stage"><canvas id="scene"></canvas></div>
<div id="layers"></div>
<div class="bar"><button id="reroll" type="button">⟲ Réengendrer le décor</button><span id="seed"></span></div>
<p class="note">192×108 rendu pixelisé. Couches séparées et tileables (parallax sans couture), tout déterministe et seedé. L'animation ici est une simple démo — tes shaders piloteront chaque calque (scroll, glow, distorsion, particules).</p>
<script>
(function(){
  const W=192,H=108;
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  var _rgb={};function hexToRgb(h){if(_rgb[h])return _rgb[h];var s=h.charAt(0)==='#'?h.slice(1):h;var v=[parseInt(s.substr(0,2),16),parseInt(s.substr(2,2),16),parseInt(s.substr(4,2),16)];_rgb[h]=v;return v;}
  const BAYER=[[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  function Layer(){var c=document.createElement('canvas');c.width=W;c.height=H;var ctx=c.getContext('2d');var img=ctx.createImageData(W,H);return {c:c,ctx:ctx,img:img,d:img.data};}
  function set(L,x,y,hex){x=x|0;y=y|0;if(x<0||x>=W||y<0||y>=H)return;var r=hexToRgb(hex);var i=(y*W+x)*4;L.d[i]=r[0];L.d[i+1]=r[1];L.d[i+2]=r[2];L.d[i+3]=255;}
  function commit(L){L.ctx.putImageData(L.img,0,0);}
  function clear(L){var d=L.d;for(var i=0;i<d.length;i++)d[i]=0;}

  // vertical dithered ramp (dark->light along ramp), fills [y0,y1)
  function vgrad(L,ramp,y0,y1){y0=y0||0;y1=y1||H;for(var y=y0;y<y1;y++){var f=(y-y0)/(y1-y0);var fi=f*(ramp.length-1);var i0=Math.floor(fi),fr=fi-i0;for(var x=0;x<W;x++){var th=BAYER[y&3][x&3]/16;var idx=i0+(fr>th?1:0);if(idx>ramp.length-1)idx=ramp.length-1;set(L,x,y,ramp[idx]);}}}

  // tileable ridge (sum of integer-frequency sines) filled to bottom (or 1px line)
  function ridge(L,baseY,amp,color,rnd,oct,fill){oct=oct||3;var ph=[],fq=[],am=[];for(var o=0;o<oct;o++){ph.push(rnd()*6.283);fq.push(o+1);am.push(amp/(o+1));}for(var x=0;x<W;x++){var v=baseY;for(o=0;o<oct;o++){v+=Math.sin(x/W*6.283*fq[o]+ph[o])*am[o];}var yy=Math.round(v);if(fill){for(var y=yy;y<H;y++)set(L,x,y,color);}else{set(L,x,yy,color);set(L,x,yy+1,color);}}}

  // one silhouette feature with horizontal wrap (keeps layer tileable)
  function feature(L,x0,baseY,size,color,kind,rnd){
    function px(dx,dy){var x=x0+dx;set(L,x,dy,color);if(x>=W)set(L,x-W,dy,color);if(x<0)set(L,x+W,dy,color);}
    var dx,dy,ww;
    if(kind==='pillar'){var w=1+(size/7|0);for(dy=baseY-size;dy<=baseY;dy++)for(dx=-w;dx<=w;dx++)px(dx,dy);}
    else if(kind==='bonecol'){var bw=1+(size/9|0);for(dy=baseY-size;dy<=baseY;dy++){var b=(Math.sin(dy*0.55)>0.55)?1:0;for(dx=-bw-b;dx<=bw+b;dx++)px(dx,dy);}}
    else if(kind==='tentacle'){var sway=size*0.22;for(dy=0;dy<=size;dy++){var t=dy/size;var cx=Math.round(Math.sin(t*3+x0)*sway*(1-t));ww=Math.max(0,Math.round((1-t)*size*0.13));for(dx=-ww;dx<=ww;dx++)px(cx+dx,baseY-dy);}}
    else if(kind==='mushroom'){var st=Math.max(1,Math.round(size*0.11));for(dy=0;dy<=size*0.72;dy++)for(dx=-st;dx<=st;dx++)px(dx,baseY-dy);var cr=Math.round(size*0.52),cy=baseY-Math.round(size*0.72),cyr=Math.max(2,Math.round(cr*0.62));for(dy=-cyr;dy<=1;dy++)for(dx=-cr;dx<=cr;dx++){if((dx*dx)/(cr*cr)+(dy*dy)/(cyr*cyr)<=1.05)px(dx,cy+dy);}}
    else if(kind==='crystal'){for(dy=0;dy<=size;dy++){ww=Math.round((1-Math.abs(dy/size-0.42)/0.6)*size*0.26);if(ww<0)ww=0;for(dx=-ww;dx<=ww;dx++)px(dx,baseY-dy);}}
    else if(kind==='spike'){for(dy=0;dy<=size;dy++){ww=Math.round((1-dy/size)*size*0.3);for(dx=-ww;dx<=ww;dx++)px(dx,baseY-dy);}}
  }
  function featuresRow(L,baseY,count,color,kind,rnd,minS,maxS){for(var k=0;k<count;k++){var x=(rnd()*W)|0;var s=minS+((rnd()*(maxS-minS+1))|0);feature(L,x,baseY+((rnd()*3)|0),s,color,kind,rnd);}}

  // atmospheric haze band via ordered dither with edge falloff
  function fog(L,y0,y1,color,density,rnd){var mid=(y0+y1)/2,half=(y1-y0)/2;for(var y=y0;y<y1;y++){var edge=1-Math.abs((y-mid)/half);if(edge<0)edge=0;for(var x=0;x<W;x++){var th=(BAYER[y&3][x&3]+ (((x*7+y*13)%4)) )/20;if(th<density*edge)set(L,x,y,color);}}}

  function ground(L,baseY,ramp,rnd){for(var y=baseY;y<H;y++){var f=(y-baseY)/(H-baseY);var idx=Math.min(ramp.length-1,(f*ramp.length)|0);for(var x=0;x<W;x++){var th=BAYER[y&3][x&3]/16;var ii=th<0.5?idx:Math.min(ramp.length-1,idx+1);set(L,x,y,ramp[ii]);}}var n=(W*0.7)|0;for(var k=0;k<n;k++){set(L,(rnd()*W)|0,baseY+((rnd()*(H-baseY))|0),ramp[0]);}}

  // oblique god-rays into a layer
  function rays(L,color,rnd,slope,count){for(var k=0;k<count;k++){var x0=rnd()*W,w=4+(rnd()*7|0),top=(H*0.78)|0;for(var y=0;y<top;y++){var cx=x0+y*slope;for(var dx=0;dx<w;dx++){var xx=(cx+dx)|0;var th=BAYER[y&3][((xx%4)+4)%4]/16;if(th<0.22*(1-y/top))set(L,((xx%W)+W)%W,y,color);}}}}

  // glowing meandering cracks near baseY
  function cracks(L,baseY,color,rnd,count){for(var k=0;k<count;k++){var x=rnd()*W,y=baseY+(rnd()-0.5)*8,len=8+(rnd()*22|0),a=rnd()*6.283;for(var s=0;s<len;s++){x+=Math.cos(a);y+=Math.sin(a)*0.4;a+=(rnd()-0.5)*0.9;set(L,((x|0)%W+W)%W,y,color);if(rnd()<0.3)set(L,((x|0)%W+W)%W,y+1,color);}}}

  // faint concentric rings around a center
  function rings(L,cx,cy,color,rnd,n){for(var k=1;k<=n;k++){var r=k*7+(rnd()*3|0);for(var a=0;a<360;a+=2){var an=a*Math.PI/180,xx=cx+Math.cos(an)*r,yy=cy+Math.sin(an)*r;if(BAYER[((yy|0)%4+4)%4][((xx|0)%4+4)%4]/16<0.5)set(L,((xx|0)%W+W)%W,yy,color);}}}

  // sparse static dots (stars / pores)
  function stars(L,color,rnd,n){for(var i=0;i<n;i++){set(L,(rnd()*W)|0,(rnd()*H)|0,color);}}

  // particle field -> animatable data
  function particles(n,y0,y1,rnd,opt){var a=[];for(var i=0;i<n;i++){a.push({x:rnd()*W,y:y0+rnd()*(y1-y0),vy:(opt.vy||0)*(0.5+rnd()),vx:(opt.vx||0)*(rnd()-0.5),ph:rnd()*6.283,tw:opt.tw||0,color:opt.color,size:opt.size||1});}return a;}

  window.__BIO={W:W,H:H,mulberry32:mulberry32,Layer:Layer,set:set,commit:commit,clear:clear,vgrad:vgrad,ridge:ridge,feature:feature,featuresRow:featuresRow,fog:fog,ground:ground,rays:rays,cracks:cracks,rings:rings,stars:stars,particles:particles};

  /* ---- helpers décor additionnels ---- */
  function discL(L,cx,cy,r,c){for(var y=-r;y<=r;y++)for(var x=-r;x<=r;x++){if(x*x+y*y<=r*r+r)set(L,cx+x,cy+y,c);}}
  function eyes(L,y0,y1,count,iris,pupil,rnd,smin,smax){for(var k=0;k<count;k++){var x=(rnd()*W)|0,y=(y0+rnd()*(y1-y0))|0,r=smin+((rnd()*(smax-smin+1))|0);discL(L,x,y,r+1,pupil);discL(L,x,y,r,iris);set(L,x,y,pupil);if(r>=2){set(L,x,y-1,pupil);set(L,x-Math.round(r*0.4),y-Math.round(r*0.4),iris);}if(rnd()<0.5){for(var dx=-r-1;dx<=r+1;dx++){set(L,((x+dx)%W+W)%W,y-r-1,pupil);}}}}
  function spikes(L,count,baseY,color,rnd,dir,minS,maxS){for(var k=0;k<count;k++){var x=(rnd()*W)|0,s=minS+((rnd()*(maxS-minS+1))|0),w0=Math.max(1,(s*0.22)|0);for(var d=0;d<=s;d++){var ww=Math.round((1-d/s)*w0);for(var dx=-ww;dx<=ww;dx++){set(L,((x+dx)%W+W)%W,baseY+dir*d,color);}}}}
  function strands(L,count,y0,color,rnd,maxLen,up){for(var k=0;k<count;k++){var x=rnd()*W,len=maxLen*(0.5+rnd()*0.5),a=rnd()*6.283;for(var d=0;d<len;d++){var xx=x+Math.sin(d*0.18+a)*2.2;set(L,((xx|0)%W+W)%W,(y0+(up?-d:d))|0,color);}}}
  function webs(L,count,color,rnd){for(var k=0;k<count;k++){var x0=rnd()*W,y0=rnd()*H*0.45,x1=x0+(rnd()-0.5)*70,y1=y0+rnd()*46,st=46;for(var s=0;s<st;s++){var t=s/st,xx=x0+(x1-x0)*t,yy=y0+(y1-y0)*t;if(BAYER[(yy|0)&3][((xx|0)%4+4)%4]/16<0.35)set(L,((xx|0)%W+W)%W,yy|0,color);}}}

  /* ===================== BIOMES ===================== */
  const BIOMES=[
    {key:'abysses',name:'Les Abysses',sub:'Le grand bleu mort, tout au fond. Tentacules lointains, colonnes de corail, neige marine.',accent:'#5af0e0',
     pal:{sky:['#050f1b','#08182a','#0c2740','#103a58','#185468'],far:'#07121d',mid:'#0c1e2e',near:'#091820',gr:['#0a161f','#06101a','#03080f']},
     build:function(L,rnd){var P=this.pal;vgrad(L.sky,P.sky);rays(L.sky,'#185468',rnd,0.55,5);ridge(L.far,76,4,P.far,rnd,3,true);featuresRow(L.far,76,7,P.far,'tentacle',rnd,16,34);featuresRow(L.far,79,4,P.far,'pillar',rnd,18,40);ridge(L.mid,90,5,P.mid,rnd,3,true);featuresRow(L.mid,90,6,P.mid,'tentacle',rnd,18,42);featuresRow(L.mid,92,3,P.mid,'crystal',rnd,12,26);featuresRow(L.near,108,4,P.near,'tentacle',rnd,30,56);ground(L.ground,99,P.gr,rnd);fog(L.fog,66,108,'#0c2740',0.55,rnd);},
     parts:function(rnd){return particles(46,18,108,rnd,{vy:-0.22,tw:1,color:'#9fd8e8',size:1}).concat(particles(16,30,100,rnd,{vy:-0.5,tw:1,color:'#5af0e0',size:1}));},
     speeds:{sky:0,far:1.5,mid:4,near:8,ground:4,fog:2.5}},
    {key:'ossuaire',name:"L'Ossuaire",sub:"Nef d'os à perte de vue. Colonnes-côtes, poussière, lueur verte des âmes.",accent:'#9af04a',
     pal:{sky:['#070907','#10130d','#1a2014','#28321c','#3a4a26'],far:'#0b0d09',mid:'#14160f',near:'#0d0e0a',gr:['#1a1812','#12100c','#0a0906']},
     build:function(L,rnd){var P=this.pal;vgrad(L.sky,P.sky);ridge(L.far,80,3,P.far,rnd,2,true);featuresRow(L.far,80,8,P.far,'bonecol',rnd,26,48);ridge(L.mid,93,4,P.mid,rnd,2,true);featuresRow(L.mid,93,6,P.mid,'bonecol',rnd,20,40);featuresRow(L.mid,94,3,P.mid,'spike',rnd,10,22);featuresRow(L.near,108,3,P.near,'bonecol',rnd,34,56);ground(L.ground,99,P.gr,rnd);fog(L.fog,64,108,'#28321c',0.5,rnd);},
     parts:function(rnd){return particles(30,10,108,rnd,{vy:0.12,tw:0,color:'#c8d0a0',size:1}).concat(particles(14,40,100,rnd,{vy:-0.18,vx:0.2,tw:1,color:'#9af04a',size:1}));},
     speeds:{sky:0,far:1.2,mid:3.5,near:7,ground:3.5,fog:2}},
    {key:'brasier',name:'Le Brasier',sub:"Ce qui brûle tout en bas. Pics d'obsidienne, lac de lave, braises et cendres.",accent:'#ff6a1a',
     pal:{sky:['#0a0606','#1a0a08','#30140e','#5e2410','#9a4014','#d66e1e'],far:'#160a08',mid:'#241008',near:'#0e0707',gr:['#d66e1e','#9a4014','#5e2410']},
     build:function(L,rnd){var P=this.pal;vgrad(L.sky,P.sky);ridge(L.far,80,5,P.far,rnd,2,true);spikes(L.far,5,80,P.far,rnd,-1,18,42);ridge(L.mid,90,4,P.mid,rnd,2,true);spikes(L.mid,4,90,P.mid,rnd,-1,12,28);vgrad(L.ground,P.gr,93,108);for(var i=0;i<W;i+=1){if(((i*5)&7)<2)set(L.ground,i,93,'#ffd9a0');}cracks(L.ground,99,'#ffb84a',rnd,9);spikes(L.near,5,106,P.mid,rnd,-1,6,16);fog(L.fog,84,97,'#9a4014',0.5,rnd);fog(L.fog,28,72,'#2a1109',0.32,rnd);},
     parts:function(rnd){return particles(40,30,108,rnd,{vy:-0.4,tw:1,color:'#ff8a3a',size:1}).concat(particles(24,6,90,rnd,{vy:0.25,vx:0.3,tw:0,color:'#6e5a4c',size:1}));},
     speeds:{sky:0,far:1.4,mid:3.8,near:7.5,ground:4,fog:2.2}},
    {key:'floraison',name:'La Floraison',sub:'La fosse colonisée par le champignon. Chapeaux géants, brume teal, spores luminescentes.',accent:'#5affc8',
     pal:{sky:['#0a0814','#141022','#231a36','#34284a','#48385e'],far:'#0c0a16',mid:'#191226',near:'#110c1c',gr:['#1a1428','#120c1e','#0a0814']},
     build:function(L,rnd){var P=this.pal;vgrad(L.sky,P.sky);ridge(L.far,80,4,P.far,rnd,3,true);featuresRow(L.far,80,7,P.far,'mushroom',rnd,22,44);ridge(L.mid,93,4,P.mid,rnd,2,true);featuresRow(L.mid,93,6,P.mid,'mushroom',rnd,18,36);featuresRow(L.mid,94,3,P.mid,'pillar',rnd,10,20);featuresRow(L.near,108,2,P.near,'mushroom',rnd,38,58);ground(L.ground,99,P.gr,rnd);fog(L.fog,60,108,'#231a36',0.5,rnd);},
     parts:function(rnd){return particles(50,20,108,rnd,{vy:-0.12,vx:0.25,tw:1,color:'#5affc8',size:1}).concat(particles(20,30,100,rnd,{vy:-0.08,vx:0.4,tw:1,color:'#aaff5a',size:1}));},
     speeds:{sky:0,far:1.3,mid:3.6,near:7,ground:3.6,fog:2}}
  ];


  /* ===================== BIOMES SUPPLÉMENTAIRES ===================== */
  // --- cauchemardesques ---
  BIOMES.push({key:'vide',name:'Le Vide',sub:'Le néant qui regarde. Étoiles mortes, anneaux d\'un lointain tourbillon, yeux qui s\'ouvrent.',accent:'#c04aff',
    pal:{sky:['#05040a','#0a0814','#120e1f','#1a1430','#241a40'],far:'#0a0816',mid:'#120c20',near:'#0e0a18',gr:['#0e0a18','#08060f','#040308']},
    build:function(L,rnd){var P=this.pal;vgrad(L.sky,P.sky);stars(L.sky,'#6a5a90',rnd,100);stars(L.sky,'#b0a0d8',rnd,20);rings(L.far,132,38,'#2e2248',rnd,5);rings(L.far,132,38,'#42325e',rnd,2);discL(L.mid,28,92,30,P.mid);for(var a=0;a<200;a++){var an=a/200*6.2832;set(L.mid,(28+Math.cos(an)*30)|0,(92+Math.sin(an)*30)|0,P.near);}for(var k=0;k<24;k++){var sx=(rnd()*W)|0,sy=(rnd()*90)|0;set(L.mid,sx,sy,'#564a7a');set(L.mid,sx-1,sy,'#3a3056');set(L.mid,sx+1,sy,'#3a3056');set(L.mid,sx,sy-1,'#6a5a90');set(L.mid,sx,sy+1,'#2a2444');}for(k=0;k<8;k++){var qx=(rnd()*W)|0,qy=20+((rnd()*66)|0);set(L.near,qx,qy,'#8a7ac0');set(L.near,qx,qy-1,'#6a5a98');set(L.near,qx,qy+1,'#4a3a72');set(L.near,qx-1,qy,'#4a3a72');}},
    parts:function(rnd){return particles(40,0,108,rnd,{vx:0.15,vy:-0.05,tw:1,color:'#7a6aa0',size:1}).concat(particles(12,10,90,rnd,{vy:-0.1,tw:1,color:'#c04aff',size:1}));},
    speeds:{sky:0,far:0.6,mid:1.6,near:4.5,ground:1.6,fog:1}});
