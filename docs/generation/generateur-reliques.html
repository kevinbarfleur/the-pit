  /* ---------- moteur (primitives éprouvées) ---------- */
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function hexToRgb(h){h=(''+h).replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c;}).join('');var n=parseInt(h,16);return [(n>>16)&255,(n>>8)&255,n&255];}
  function makeGrid(w,h){return {w:w,h:h,data:new Array(w*h).fill(null)};}
  function set(g,x,y,c){x=x|0;y=y|0;if(x<0||y<0||x>=g.w||y>=g.h)return;g.data[y*g.w+x]=c;}
  function ellipse(g,cx,cy,rx,ry,c){cx=Math.round(cx);cy=Math.round(cy);rx=Math.max(1,Math.round(rx));ry=Math.max(1,Math.round(ry));for(var y=-ry;y<=ry;y++){for(var x=-rx;x<=rx;x++){if((x*x)/(rx*rx)+(y*y)/(ry*ry)<=1.05){set(g,cx+x,cy+y,c);}}}}
  function disc(g,cx,cy,r,c){cx=Math.round(cx);cy=Math.round(cy);r=Math.max(0,Math.round(r));for(var y=-r;y<=r;y++){for(var x=-r;x<=r;x++){if(x*x+y*y<=r*r+r*0.5){set(g,cx+x,cy+y,c);}}}}
  function line(g,x0,y0,x1,y1,c){x0=Math.round(x0);y0=Math.round(y0);x1=Math.round(x1);y1=Math.round(y1);var dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy;while(true){set(g,x0,y0,c);if(x0===x1&&y0===y1)break;var e2=2*err;if(e2>-dy){err-=dy;x0+=sx;}if(e2<dx){err+=dx;y0+=sy;}}}
  function tube(g,pts,r0,r1,c){if(pts.length===1){disc(g,pts[0][0],pts[0][1],r0,c);return;}var segLens=[],total=0,i;for(i=1;i<pts.length;i++){var dx=pts[i][0]-pts[i-1][0],dy=pts[i][1]-pts[i-1][1];var l=Math.hypot(dx,dy);segLens.push(l);total+=l;}if(total===0){disc(g,pts[0][0],pts[0][1],r0,c);return;}var acc=0;for(i=1;i<pts.length;i++){var a=pts[i-1],b=pts[i],L=segLens[i-1];var steps=Math.max(1,Math.ceil(L));for(var s=0;s<=steps;s++){var t=(acc+L*s/steps)/total;var x=a[0]+(b[0]-a[0])*s/steps,y=a[1]+(b[1]-a[1])*s/steps;var r=r0+(r1-r0)*t;disc(g,x,y,r,c);}acc+=L;}}
  function polygon(g,pts,c){var miny=Infinity,maxy=-Infinity,i;for(i=0;i<pts.length;i++){miny=Math.min(miny,pts[i][1]);maxy=Math.max(maxy,pts[i][1]);}miny=Math.floor(miny);maxy=Math.ceil(maxy);for(var y=miny;y<=maxy;y++){var xs=[];for(i=0;i<pts.length;i++){var a=pts[i],b=pts[(i+1)%pts.length];var y0=a[1],y1=b[1];if((y0<=y&&y1>y)||(y1<=y&&y0>y)){xs.push(a[0]+(b[0]-a[0])*(y-y0)/(y1-y0));}}xs.sort(function(p,q){return p-q;});for(var k=0;k+1<xs.length;k+=2){for(var x=Math.round(xs[k]);x<=Math.round(xs[k+1]);x++){set(g,x,y,c);}}}}
  function rectF(g,x0,y0,x1,y1,c){for(var y=y0;y<=y1;y++)for(var x=x0;x<=x1;x++)set(g,x,y,c);}
  function outline(g,oc){var w=g.w,h=g.h,src=g.data.slice();for(var y=0;y<h;y++){for(var x=0;x<w;x++){if(src[y*w+x]!==null)continue;var t=(x>0&&src[y*w+x-1])||(x<w-1&&src[y*w+x+1])||(y>0&&src[(y-1)*w+x])||(y<h-1&&src[(y+1)*w+x]);if(t)g.data[y*w+x]=oc;}}}

  /* ---------- motifs ---------- */
  function mFlame(g,p,rnd,o){o=o||{};var cx=o.cx||20,cy=o.cy||26,h=o.h||18,baseR=o.baseR||7,i,t,y,r,col,i2,t2,y2;
    for(i=0;i<h;i++){t=i/h;y=cy-i;r=baseR*(1-t*0.85)*(1+0.12*Math.sin(i*0.8));if(r<0.6)r=0.6;col=t<0.22?p.sh:(t<0.55?p.base:(t<0.82?p.hi:p.accent));disc(g,cx+Math.round(Math.sin(i*0.5)*1.2*t),y,r,col);}
    for(i2=2;i2<h-3;i2++){t2=i2/h;y2=cy-i2;disc(g,cx+Math.round(Math.sin(i2*0.5)*1.2*t2),y2,Math.max(0.6,baseR*0.42*(1-t2)),p.accent);}}
  function mHeart(g,p,rnd,o){var cx=20,cy=20,s=10,x,y,nx,Y,v,col;
    for(y=-s;y<=s+2;y++)for(x=-s-1;x<=s+1;x++){nx=x/s;Y=-(y)/s+0.28;v=Math.pow(nx*nx+Y*Y-1,3)-nx*nx*Y*Y*Y;if(v<=0){col=p.base;if(y>s*0.25)col=p.sh;set(g,cx+x,cy+y,col);}}
    disc(g,cx-4,cy-3,3,p.hi);disc(g,cx-4,cy-3,1,p.accent);line(g,cx,cy-6,cx,cy+2,p.sh);
    if(o&&o.flame){mFlame(g,p,rnd,{cx:cx,cy:cy-6,h:11,baseR:4});}}
  function mShield(g,p,rnd,o){o=(o&&o.o)||{};var cx=20,cy=20,i;
    polygon(g,[[cx-10,cy-11],[cx+10,cy-11],[cx+10,cy-1],[cx+5,cy+8],[cx,cy+13],[cx-5,cy+8],[cx-10,cy-1]],p.sh);
    polygon(g,[[cx-8,cy-9],[cx+8,cy-9],[cx+8,cy-1],[cx+4,cy+6],[cx,cy+10],[cx-4,cy+6],[cx-8,cy-1]],p.base);
    line(g,cx-8,cy-9,cx+8,cy-9,p.hi);disc(g,cx,cy-1,3,p.hi);disc(g,cx,cy-1,2,p.accent);
    if(o.crack){line(g,cx+2,cy-8,cx-1,cy+2,p.deep);line(g,cx-1,cy+2,cx+2,cy+9,p.deep);line(g,cx-1,cy+2,cx-4,cy+5,p.deep);}
    if(o.thorn){for(i=-2;i<=2;i++){var tx=cx+i*5;polygon(g,[[tx-1,cy-11],[tx+1,cy-11],[tx,cy-15]],p.accent);}}
    if(o.wave){for(i=-1;i<=2;i++){var wy=cy-2+i*3;line(g,cx-7,wy,cx-3,wy-1,p.hi);line(g,cx-3,wy-1,cx+1,wy,p.hi);line(g,cx+1,wy,cx+5,wy-1,p.hi);}}}
  function mBowl(g,p,rnd,o){var lp=(o&&o.lp)||p,cx=20,cy=22,x,y;
    for(y=0;y<=9;y++)for(x=-12;x<=12;x++){if((x*x)/144+(y*y)/100<=1&&y>=0)set(g,cx+x,cy+y,p.sh);}
    for(y=1;y<=9;y++)for(x=-11;x<=11;x++){if((x*x)/121+(y*y)/81<=1&&y>=1)set(g,cx+x,cy+y,p.base);}
    ellipse(g,cx,cy,12,2,p.hi);ellipse(g,cx,cy,10,1.6,lp.base);ellipse(g,cx,cy,10,1.3,lp.hi);disc(g,cx+4,cy,1,lp.accent);
    if(o&&o.bubbles){disc(g,cx-4,cy-1,1,lp.hi);disc(g,cx+2,cy-2,1,lp.accent);disc(g,cx+6,cy-1,1,lp.hi);}
    rectF(g,cx-3,cy+10,cx+3,cy+12,p.sh);rectF(g,cx-6,cy+12,cx+6,cy+13,p.base);}
  function mNail(g,p,rnd,o){var cx=20;ellipse(g,cx,9,6,2,p.sh);ellipse(g,cx,8,6,2,p.base);line(g,cx-5,7,cx+5,7,p.hi);
    tube(g,[[cx,10],[cx,28]],3,0.6,p.sh);tube(g,[[cx,10],[cx,28]],2,0.4,p.base);line(g,cx-1,11,cx-1,26,p.hi);}
  function mMushroom(g,p,rnd,o){var cx=20,cy=18,x,y;
    for(y=-8;y<=2;y++)for(x=-12;x<=12;x++){if((x*x)/144+(y*y)/81<=1&&y<=2)set(g,cx+x,cy+y,p.sh);}
    for(y=-7;y<=1;y++)for(x=-11;x<=11;x++){if((x*x)/121+(y*y)/64<=1&&y<=1)set(g,cx+x,cy+y,p.base);}
    ellipse(g,cx-3,cy-4,4,2,p.hi);disc(g,cx-5,cy-3,1,p.accent);disc(g,cx+4,cy-2,1,p.accent);disc(g,cx,cy-5,1,p.accent);
    rectF(g,cx-11,cy+1,cx+11,cy+2,p.deep);tube(g,[[cx,cy+2],[cx,cy+15]],3,4,p.sh);tube(g,[[cx,cy+2],[cx,cy+14]],2,3,p.base);line(g,cx-1,cy+3,cx-1,cy+13,p.hi);}
  function mBalance(g,p,rnd,o){var cx=20,s,x,x2;tube(g,[[cx,8],[cx,30]],1.4,1.4,p.sh);line(g,cx-12,12,cx+12,12,p.base);line(g,cx-12,11,cx+12,11,p.hi);disc(g,cx,8,2,p.hi);rectF(g,cx-4,30,cx+4,31,p.sh);

    if(has(A,'blink')){for(xx=-2;xx<=2;xx++)for(yy=-2;yy<=2;yy++){if(xx*xx+yy*yy<=4)blk(ctx,SC,cx+xx,cy+yy,1,p.accent,1);}var gz=Math.round(Math.sin(t*0.9)*2),gy=Math.round(Math.sin(t*0.6)*1);blk(ctx,SC,cx+gz-1,cy+gy-1,2,'#100a14',1);blk(ctx,SC,cx+gz-1,cy+gy-1,1,'#ffffff',0.9);var bl=Math.sin(t*0.7);if(bl>0.93)for(xx=-12;xx<=12;xx++)for(yy=-7;yy<=7;yy++){if((xx*xx)/169+(yy*yy)/49<=1)blk(ctx,SC,cx+xx,cy+yy,1,p.sh,1);}}

    if(has(A,'brew')){var lq=relic._liquid||p;for(i=0;i<5;i++){ph=(t*0.7+i*0.37)%1;bx=14+_h2(i,2)*12;by=29-ph*7;if(ph<0.85)blk(ctx,SC,bx,by,1,i%2?lq.accent:lq.hi,(1-ph)*0.85);if(ph>0.8&&ph<0.95){blk(ctx,SC,bx-1,22,1,lq.hi,0.6);blk(ctx,SC,bx+1,22,1,lq.hi,0.6);}}}
    if(has(A,'chant')){for(k=0;k<3;k++){var mx=10+k*10,cl=0.5+0.5*Math.sin(t*3+k*2.1),amt=Math.round(cl*4);for(i=0;i<amt;i++)for(xx=-2;xx<=2;xx++){blk(ctx,SC,mx+xx,cy-5+i,1,p.sh,1);blk(ctx,SC,mx+xx,cy+5-i,1,p.sh,1);}if(cl<0.18)blk(ctx,SC,mx,cy-9-Math.round((0.18-cl)*10),1,p.hi,0.5);}}
    if(has(A,'bristle')){for(i=-2;i<=2;i++){var tx=20+i*5,pb=Math.sin(t*4+i*1.3);if(pb>0.5){blk(ctx,SC,tx,5,1,p.accent,(pb-0.5)*2);blk(ctx,SC,tx,4,1,p.accent,(pb-0.5)*1.5);}}}
    if(has(A,'barrier')){var seg=10;for(i=0;i<seg;i++){an=t*1.5+i/seg*6.283;blk(ctx,SC,20+Math.cos(an)*13,20+Math.sin(an)*12.4,1,p.accent,0.5+0.3*Math.sin(an*2));}var fb=(t*0.7)%1;if(fb<0.12)for(i=0;i<seg*2;i++){an=i/(seg*2)*6.283;blk(ctx,SC,20+Math.cos(an)*13,20+Math.sin(an)*12.4,1,p.hi,(0.12-fb)/0.12);}}
    if(has(A,'ward')){var pw=0.4+0.6*(0.5+0.5*Math.sin(t*3)),wp=[[22,12],[21,15],[20,18],[19,22],[20,25],[22,29],[18,24],[16,25]];for(i=0;i<wp.length;i++)blk(ctx,SC,wp[i][0],wp[i][1],1,p.accent,pw);var wsx=(t*1.3)%1;if(wsx<0.4)blk(ctx,SC,19+Math.sin(t*9)*2,22-wsx*6,1,p.hi,(0.4-wsx)/0.4);}
    if(has(A,'waveflow')){for(k=0;k<2;k++){var yp=((t*0.5)+k*0.5)%1,wy=28-yp*16;for(xx=-6;xx<=6;xx++)blk(ctx,SC,20+xx,wy+Math.round(Math.sin(xx*0.6+t*3)*1.2),1,p.hi,(1-Math.abs(yp-0.5)*1.4)*0.7);}}
    if(has(A,'strike')){var nL=7,pr=(t*0.55)%1,act=Math.floor(pr*nL);for(i=0;i<=act&&i<nL;i++){var ly=Math.round(cy+(i-3)*2.6),fr=i<act?1:(pr*nL-act),x1=Math.round(13+fr*12);for(xx=13;xx<=x1;xx++)blk(ctx,SC,xx,ly,1,'#7d1426',0.9);}}
    if(has(A,'sealpulse')){var sp2=0.55+0.45*Math.sin(t*4);blk(ctx,SC,20,21,2,'#ff7283',sp2*0.5);for(i=0;i<4;i++){ph=(t*0.5+i*0.25)%1;blk(ctx,SC,20+Math.sin(i*2+t*2)*(1+ph*3),14-ph*10,1,'#2a1840',(1-ph)*0.6);}}
    if(has(A,'pageflip')){var pp=(t*0.6)%1,lf=pp<0.5?pp*2:(1-pp)*2,s2=Math.round(lf*6);for(i=0;i<s2;i++){blk(ctx,SC,28-i,10+i,1,p.hi,0.9);blk(ctx,SC,28-i,11+i,1,p.base,0.7);}}
    if(has(A,'coinpop')){for(i=0;i<3;i++){ph=(t*0.8+i*0.5)%1;bx=16+i*4;by=8+ph*13;if(ph<0.9){blk(ctx,SC,bx,by,2,p.hi,1);blk(ctx,SC,bx+1,by,1,p.accent,0.9);}else blk(ctx,SC,bx,22,1,p.accent,0.7);}}
    if(has(A,'coinspin')&&sxMul>0.88)blk(ctx,SC,20+Math.sin(t*1.8)*8,20,1,p.accent,0.9);
    if(has(A,'dig')){var ht=Math.sin(t*3);if(ht>0.7)for(i=0;i<4;i++){var ag=-0.3-i*0.45,sp=(ht-0.7)/0.3;blk(ctx,SC,20+Math.cos(ag)*sp*8,33-Math.abs(Math.sin(ag))*sp*6,1,'#3a2014',1-sp*0.5);}}
    if(has(A,'mist')){for(i=0;i<6;i++){ph=(t*0.4+i*0.5)%1;blk(ctx,SC,10+i*4+Math.sin(t+i)*2,33-ph*18,1,'#8a90a4',(1-ph)*0.4);}}
    if(has(A,'lure')){var gpL=relic._glowPal||p;for(i=0;i<5;i++){ph=(t*0.6+i*0.4)%1;an=i/5*6.283;var rr=10*(1-ph);blk(ctx,SC,20+Math.cos(an)*rr,21+Math.sin(an)*rr,1,gpL.accent,ph<0.9?0.3+ph*0.5:0);}}
  }

  /* ---------- expose pour tests ---------- */
  if(typeof window!=='undefined'){window.__RELICTEST={RELICS:RELICS,buildRelic:buildRelic,drawRelic:drawRelic,PAL:PAL,VIS:VIS,renderGrid:renderGrid};}

  /* ---------- UI ---------- */
  function init(){
    var grid=document.getElementById('grid');if(!grid)return;
    var BIG=4,INV=2,cards=[];
    RELICS.forEach(function(relic){
      buildRelic(relic);
      var card=document.createElement('div');card.className='card '+relic.card_color;
      var art=document.createElement('div');art.className='art';
      var big=document.createElement('canvas');big.className='big';big.width=40*BIG;big.height=40*BIG;
      var invw=document.createElement('div');invw.className='invwrap';
      var inv=document.createElement('canvas');inv.className='inv';inv.width=40*INV;inv.height=40*INV;
      var invl=document.createElement('div');invl.className='invlbl';invl.textContent='inventaire';
      invw.appendChild(inv);invw.appendChild(invl);art.appendChild(big);art.appendChild(invw);
      var meta=document.createElement('div');meta.className='meta';
      meta.innerHTML='<div class="name">'+relic.name+'</div><div class="badge">T'+relic.tier+' · '+relic.band+'</div><div class="eff">'+relic.effect+'</div><div class="flav">'+relic.flavor+'</div>';
      card.appendChild(art);card.appendChild(meta);grid.appendChild(card);
      // base offscreen (icône statique) — sert aussi à l'inventaire
      var base=document.createElement('canvas');base.width=40*BIG;base.height=40*BIG;renderGrid(relic._g,base.getContext('2d'),BIG);relic._base=base;
      renderGrid(relic._g,inv.getContext('2d'),INV);   // inventaire = statique
      cards.push({relic:relic,ctx:big.getContext('2d')});
    });
    var last=0;
    function loop(now){requestAnimationFrame(loop);if(now-last<40)return;last=now;var t=now/1000;for(var i=0;i<cards.length;i++){try{drawRelic(cards[i].relic,cards[i].ctx,BIG,t);}catch(e){}}}
    requestAnimationFrame(loop);
  }
  if(typeof document!=='undefined'&&document.getElementById('grid'))init();
})();
</script>
</body></html>
