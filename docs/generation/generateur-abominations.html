<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Abominations du Pit — générateur de boss</title>
<style>
:root{--accent:#9a5a8e;--bg:#08080e;--panel:#10111a;--ink:#d8d2c4;--mut:#7a7468;}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#14101c 0%,var(--bg) 60%);color:var(--ink);font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;}
header{padding:24px 20px 8px;text-align:center}
h1{margin:0;font-size:30px;letter-spacing:3px;font-weight:600;color:#e8e0d0;text-shadow:0 0 18px rgba(154,90,142,.4)}
.tag{margin:6px 0 0;color:var(--mut);font-size:13px;font-style:italic}
#species{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:14px 16px;max-width:900px;margin:0 auto}
.sp{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.5px;padding:6px 12px;border:1px solid #2a2636;background:#14131d;color:#b8b2a4;border-radius:3px;cursor:pointer;transition:.15s}
.sp:hover{border-color:var(--accent);color:#e8e0d0}
.sp.active{border-color:var(--accent);background:var(--accent);color:#0a0810}
.head2{text-align:center;padding:6px 20px 0}
#spName{font-size:21px;letter-spacing:1px;color:#e8e0d0}
#spSub{color:var(--mut);font-size:13px;font-style:italic;max-width:620px;margin:4px auto 0}
#warband{max-width:760px;margin:18px auto;padding:0 16px;display:flex;flex-direction:column;align-items:center;gap:12px}
.bossWrap{position:relative;display:flex;flex-direction:column;align-items:center;background:var(--panel);border:1px solid #221f2e;border-radius:8px;padding:14px 18px 10px;box-shadow:0 0 30px rgba(0,0,0,.55),inset 0 0 50px rgba(154,90,142,.06)}
.bossWrap::before{content:'BOSS';position:absolute;top:8px;left:12px;font-family:ui-monospace,monospace;font-size:10px;letter-spacing:2px;color:var(--accent);opacity:.7}
.bossWrap canvas{image-rendering:pixelated;width:min(86vw,372px);height:auto}
.generals{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;width:100%}
.gen{display:flex;flex-direction:column;align-items:center;background:var(--panel);border:1px solid #1e1b29;border-radius:6px;padding:10px 8px 8px}
.gen canvas{image-rendering:pixelated;width:min(44vw,186px);height:auto}
.cname{font-family:ui-monospace,monospace;font-size:11px;color:#9a9384;margin-top:6px;letter-spacing:.5px}
.cname.big{font-size:14px;color:var(--accent);letter-spacing:1px;margin-top:8px}
.bar{display:flex;gap:14px;align-items:center;justify-content:center;padding:6px 20px 26px;flex-wrap:wrap}
#reroll{font-family:ui-monospace,monospace;font-size:13px;padding:8px 18px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:4px;cursor:pointer;transition:.15s}
#reroll:hover{background:var(--accent);color:#0a0810}
#seed{font-family:ui-monospace,monospace;font-size:11px;color:var(--mut)}
#seed b{color:#b8b2a4;font-weight:600}
.note{max-width:680px;margin:0 auto 30px;padding:0 20px;color:#5e584c;font-size:11px;text-align:center;font-style:italic}
</style></head><body>
<header><h1>ABOMINATIONS DU PIT</h1><p class="tag">ce qui dort au fond de la fosse — le défi optionnel d'après-victoire</p></header>
<nav id="species"></nav>
<div class="head2"><div id="spName"></div><div id="spSub"></div></div>
<div id="warband"></div>
<div class="bar"><button id="reroll" type="button">⟲ Réengendrer l'engeance</button><span id="seed"></span></div>
<p class="note">Le boss est rendu à 96 px, ses trois généraux à 48 px (moitié de sa taille). Pièces géométriques placeholder — tout est déterministe et seedé, avec idle animé.</p>
<script>
(function(){

  function makeGrid(w,h){return {w:w,h:h,data:new Array(w*h).fill(null),eyes:[]};}

  function ellipse(g,cx,cy,rx,ry,c){cx=Math.round(cx);cy=Math.round(cy);rx=Math.max(1,Math.round(rx));ry=Math.max(1,Math.round(ry));for(var y=-ry;y<=ry;y++){for(var x=-rx;x<=rx;x++){if((x*x)/(rx*rx)+(y*y)/(ry*ry)<=1.05){set(g,cx+x,cy+y,c);}}}}
  function disc(g,cx,cy,r,c){cx=Math.round(cx);cy=Math.round(cy);r=Math.max(0,Math.round(r));for(var y=-r;y<=r;y++){for(var x=-r;x<=r;x++){if(x*x+y*y<=r*r+r*0.5){set(g,cx+x,cy+y,c);}}}}
  function line(g,x0,y0,x1,y1,c){x0=Math.round(x0);y0=Math.round(y0);x1=Math.round(x1);y1=Math.round(y1);var dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy;while(true){set(g,x0,y0,c);if(x0===x1&&y0===y1)break;var e2=2*err;if(e2>-dy){err-=dy;x0+=sx;}if(e2<dx){err+=dx;y0+=sy;}}}
  function tube(g,pts,r0,r1,c){if(pts.length===1){disc(g,pts[0][0],pts[0][1],r0,c);return;}var segLens=[],total=0,i;for(i=1;i<pts.length;i++){var dx=pts[i][0]-pts[i-1][0],dy=pts[i][1]-pts[i-1][1];var l=Math.hypot(dx,dy);segLens.push(l);total+=l;}if(total===0){disc(g,pts[0][0],pts[0][1],r0,c);return;}var acc=0;for(i=1;i<pts.length;i++){var a=pts[i-1],b=pts[i],L=segLens[i-1];var steps=Math.max(1,Math.ceil(L));for(var s=0;s<=steps;s++){var t=(acc+L*s/steps)/total;var x=a[0]+(b[0]-a[0])*s/steps,y=a[1]+(b[1]-a[1])*s/steps;var r=r0+(r1-r0)*t;disc(g,x,y,r,c);}acc+=L;}}

  function polygon(g,pts,c){var miny=Infinity,maxy=-Infinity,i;for(i=0;i<pts.length;i++){miny=Math.min(miny,pts[i][1]);maxy=Math.max(maxy,pts[i][1]);}miny=Math.floor(miny);maxy=Math.ceil(maxy);for(var y=miny;y<=maxy;y++){var xs=[];for(i=0;i<pts.length;i++){var a=pts[i],b=pts[(i+1)%pts.length];var y0=a[1],y1=b[1];if((y0<=y&&y1>y)||(y1<=y&&y0>y)){xs.push(a[0]+(b[0]-a[0])*(y-y0)/(y1-y0));}}xs.sort(function(p,q){return p-q;});for(var k=0;k+1<xs.length;k+=2){for(var x=Math.round(xs[k]);x<=Math.round(xs[k+1]);x++){set(g,x,y,c);}}}}
  function ditherRing(g,cx,cy,rxIn,ryIn,rxOut,ryOut,color){cx=Math.round(cx);cy=Math.round(cy);var ox=Math.ceil(rxOut),oy=Math.ceil(ryOut);for(var y=-oy;y<=oy;y++){for(var x=-ox;x<=ox;x++){var dOut=(x*x)/(rxOut*rxOut)+(y*y)/(ryOut*ryOut);var dIn=(x*x)/(rxIn*rxIn)+(y*y)/(ryIn*ryIn);if(dOut<=1.02&&dIn>1.0&&(((cx+x)+(cy+y))&1)===0){set(g,cx+x,cy+y,color);}}}}
  function mass(g,cx,cy,rx,ry,p){var sR=0.82,bR=0.56,hR=0.30;ellipse(g,cx,cy,rx,ry,p.deep);ellipse(g,cx,cy,rx*sR,ry*sR,p.sh);ellipse(g,cx,cy,rx*bR,ry*bR,p.base);ditherRing(g,cx,cy,rx*bR,ry*bR,rx*sR,ry*sR,p.base);ditherRing(g,cx,cy,rx*sR,ry*sR,rx,ry,p.sh);ellipse(g,cx-rx*0.26,cy-ry*0.32,rx*hR,ry*hR,p.hi);}
  function blob(g,cx,cy,rx,ry,p,rnd){ellipse(g,cx,cy+ry*0.45,rx*1.05,ry*0.5,p.deep);ellipse(g,cx,cy,rx,ry,p.deep);ellipse(g,cx,cy,rx-1,ry-1,p.base);var nb=4+Math.floor(rnd()*4);for(var i=0;i<nb;i++){var a=rnd()*6.283;disc(g,cx+Math.cos(a)*rx*0.92,cy+Math.sin(a)*ry*0.92,1+Math.floor(rnd()*2),p.base);}ellipse(g,cx,cy+ry*0.5,rx*0.95,ry*0.4,p.sh);ellipse(g,cx,cy-ry*0.15,rx*0.7,ry*0.55,p.base);ellipse(g,cx-rx*0.32,cy-ry*0.36,rx*0.34,ry*0.28,p.hi);set(g,Math.round(cx-rx*0.34),Math.round(cy-ry*0.46),p.bone);set(g,Math.round(cx-rx*0.28),Math.round(cy-ry*0.40),p.bone);}

  function maw(g,x,y,w,p){x=Math.round(x);y=Math.round(y);for(var i=-w;i<=w;i++){for(var j=-1;j<=1;j++){set(g,x+i,y+j,p.deep);}}for(i=-w;i<=w;i+=2){set(g,x+i,y-1,p.bone);set(g,x+i,y+1,p.bone);}}
  function growth(g,x,y,p,rnd){x=Math.round(x);y=Math.round(y);var len=2+Math.floor(rnd()*3);var tx=x+Math.round((rnd()-0.5)*5);tube(g,[[x,y],[tx,y-len]],2,1,p.base);if(rnd()<0.5){disc(g,tx,y-len,1,p.eye);}else{disc(g,tx,y-len,1,p.deep);}}
  function rstreak(g,x,y,r,c,rnd){var a=rnd()*Math.PI;var dx=Math.cos(a)*r,dy=Math.sin(a)*r;line(g,x-dx,y-dy,x+dx,y+dy,c);}
  function thinBone(g,pts,p){tube(g,pts,1,1,p.bone);disc(g,pts[0][0],pts[0][1],1,p.bone);disc(g,pts[pts.length-1][0],pts[pts.length-1][1],1,p.bone);}
  function thinSpineRibs(g,cx,topY,botY,p,width){for(var y=topY;y<=botY;y++){if(y%2===0)set(g,cx,y,p.bone);else set(g,cx,y,p.sh);}var n=4;for(var i=0;i<n;i++){var ry=topY+1+Math.round(i*((botY-topY-2)/(n-1)));var w=width*(1-Math.abs((i/(n-1))-0.3)*0.5);tube(g,[[cx-1,ry],[cx-w*0.7,ry+1],[cx-w,ry+2]],1,1,p.bone);tube(g,[[cx+1,ry],[cx+w*0.7,ry+1],[cx+w,ry+2]],1,1,p.bone);}}
  function skullThin(g,cx,cy,r,p){ellipse(g,cx,cy,r,r,p.bone);ellipse(g,cx,cy-1,r-1,r-1,p.bone);var so=Math.max(1,Math.round(r*0.5));disc(g,cx-so,cy-1,1,p.deep);disc(g,cx+so,cy-1,1,p.deep);set(g,cx-so,cy-1,p.eyeDim);set(g,cx+so,cy-1,p.eyeDim);set(g,cx,cy+1,p.deep);var jw=Math.max(1,Math.round(r*0.6));for(var tx=-jw;tx<=jw;tx++){set(g,cx+tx,cy+r-1,p.bone);}for(tx=-jw;tx<=jw;tx+=2){set(g,cx+tx,cy+r-1,p.deep);}}
  function outline(g,oc){var w=g.w,h=g.h,src=g.data.slice();for(var y=0;y<h;y++){for(var x=0;x<w;x++){if(src[y*w+x]!==null)continue;var touch=false;if(x>0&&src[y*w+x-1])touch=true;else if(x<w-1&&src[y*w+x+1])touch=true;else if(y>0&&src[(y-1)*w+x])touch=true;else if(y<h-1&&src[(y+1)*w+x])touch=true;if(touch)g.data[y*w+x]=oc;}}}
  function blit(g,canvas,scale,baseline,glowHex,floatMode,t,prof,A,p){

  function tEmber(g,rnd,p,A){var m=A.mass[0];for(var i=0;i<6;i++){var q=onMass(rnd,m);if(rnd()<0.5)set(g,q[0],q[1],p.eye);else rstreak(g,q[0],q[1],3,p.eye,rnd);}for(i=0;i<2;i++){var e=onMass(rnd,m);set(g,e[0],e[1],p.deep);}}
  function tSpore(g,rnd,p,A){var m=A.mass[0];for(var i=0;i<6;i++){var q=onMass(rnd,m);disc(g,q[0],q[1],1,rnd()<0.6?p.eye:p.hi);}for(i=0;i<2;i++){var e=onMass(rnd,m);if(rnd()<0.5)eye(g,e[0],e[1],1,p);}}
  function tVoid(g,rnd,p,A){var m=A.mass[0];for(var i=0;i<5;i++){var q=onMass(rnd,m);set(g,q[0],q[1],rnd()<0.5?p.bone:p.eye);}for(i=0;i<2;i++){var e=onMass(rnd,m);if(rnd()<0.5)eye(g,e[0],e[1],1,p);}}
  function tWorm(g,rnd,p,A){var m=A.mass[0];for(var i=0;i<5;i++){var q=onMass(rnd,m);if(rnd()<0.5)disc(g,q[0],q[1],1,p.hi);else set(g,q[0],q[1],p.deep);}for(i=0;i<2;i++){var e=onMass(rnd,m);if(rnd()<0.4)eye(g,e[0],e[1],1,p);}}

  BOSSES.push({key:'ruche',name:'La Reine-Mère',sub:'Mère bouffie qui pond sans fin au fond des galeries. Mandibules, dards, couvée grouillante.',accent:'#9aff3a',boss:'bBroodMother',generals:['gHiveSoldier','gHiveWinged','gHiveBurrower'],gnames:['Soldat de la ruche','Drone ailé','Foreuse'],pals:PAL_HIVE,treat:tChitin});
  BOSSES.push({key:'brasier',name:'Le Seigneur du Brasier',sub:'Ce qui brûle tout en bas. Colosse d\'obsidienne fissuré de magma, noyau ardent.',accent:'#ff6a1a',boss:'bEmberLord',generals:['gCinderHound','gAshWraith','gMagmaBrute'],gnames:['Limier de cendre','Spectre de cendre','Brute de magma'],pals:PAL_EMBER,treat:tEmber});

  /* ===================== INTERFACE ===================== */
  function getEl(id){return document.getElementById(id);}
  var spEl=getEl('species'), wb=getEl('warband'), spName=getEl('spName'), spSub=getEl('spSub'), seedEl=getEl('seed');
  var BOSS_SCALE=4, GEN_SCALE=4, cur=0, master=(Math.random()*0xffffffff)>>>0;
  var CARDS=[];
  function gen(archName,palArr,treat,seed,gridN,base){
    var rnd=mulberry32(seed>>>0);
    var p=palArr[Math.floor(rnd()*palArr.length)];
    var g=makeGrid(gridN,gridN);
    var A=ARCH[archName](g,rnd,p);
    treat(g,rnd,p,A);
    outline(g,p.out);
    return {g:g,A:A,p:p,prof:PROF[archName]||{},fl:!!A.float,base:base};
  }
  function buildWarband(){
    var sp=BOSSES[cur]; wb.innerHTML=''; CARDS=[];
    var bw=document.createElement('div');bw.className='bossWrap';
    var bcv=document.createElement('canvas');bw.appendChild(bcv);
    var bn=document.createElement('div');bn.className='cname big';bn.textContent=sp.name;bw.appendChild(bn);
    wb.appendChild(bw);
    try{var b=gen(sp.boss,sp.pals,sp.treat,master,96,90);b.cv=bcv;b.scale=BOSS_SCALE;CARDS.push(b);}catch(e){bn.textContent='(boss raté)';}
    var gr=document.createElement('div');gr.className='generals';wb.appendChild(gr);
    for(var i=0;i<3;i++){
      var gc=document.createElement('div');gc.className='gen';
      var gcv=document.createElement('canvas');gc.appendChild(gcv);
      var gl=document.createElement('div');gl.className='cname';gl.textContent=sp.gnames[i];gc.appendChild(gl);
      gr.appendChild(gc);
      try{var gg=gen(sp.generals[i],sp.pals,sp.treat,(master+(i+1)*0x9E3779B9)>>>0,48,45);gg.cv=gcv;gg.scale=GEN_SCALE;CARDS.push(gg);}catch(e){gl.textContent+=' (raté)';}
    }
    seedEl.innerHTML='sceau <b>0x'+(master>>>0).toString(16).padStart(8,'0')+'</b>';
  }
  function renderTabs(){spEl.innerHTML='';BOSSES.forEach(function(b,idx){var el=document.createElement('button');el.className='sp'+(idx===cur?' active':'');el.type='button';el.textContent=b.name;el.addEventListener('click',function(){selectSp(idx);});spEl.appendChild(el);});}
  function selectSp(idx){cur=idx;var b=BOSSES[idx];document.documentElement.style.setProperty('--accent',b.accent);spName.textContent=b.name;spSub.textContent=b.sub;renderTabs();buildWarband();}
  getEl('reroll').addEventListener('click',function(){master=(Math.random()*0xffffffff)>>>0;buildWarband();});
  selectSp(0);
  var _la=0;
  function _loop(now){requestAnimationFrame(_loop);if(now-_la<33)return;_la=now;var t=now/1000;for(var i=0;i<CARDS.length;i++){var c=CARDS[i];try{blit(c.g,c.cv,c.scale,c.base,c.p.eye,c.fl,t,c.prof,c.A,c.p);}catch(e){}}}
  requestAnimationFrame(_loop);
})();
